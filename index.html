<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sum of Even Numbers</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Sum of Even Numbers</h1>
    <p>Enter a number <strong>N</strong>. The app will calculate the sum of all even numbers from 1 to N.</p>

    <label for="numberInput">Enter N:</label>
    <input id="numberInput" type="number" min="1" placeholder="e.g. 10" />
    <button id="calculateButton">Calculate Sum</button>

    <div id="result" class="result"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
